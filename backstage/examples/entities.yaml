# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-api
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: characters-api-v1
  description: Dragon Ball characters CRUD API with pagination and filtering by name, earthling status, and introduction phase
spec:
  type: openapi
  lifecycle: production
  owner: api-developers
  system: dragon-ball-platform
  apiProvidedBy: dragonball-character-service
  definition: |
    openapi: "3.0.0"
    info:
      version: 1.0.0
      title: Characters API
      description: Dragon Ball characters CRUD API
    servers:
      - url: http://localhost:8000/api/dragonball/v1
    paths:
      /characters:
        get:
          summary: List characters with pagination and filtering
          parameters:
            - name: page
              in: query
              schema:
                type: integer
            - name: pageSize
              in: query
              schema:
                type: integer
            - name: name
              in: query
              schema:
                type: string
          responses:
            "200":
              description: Paginated list of characters
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: "#/components/schemas/Character"
        post:
          summary: Create a new character
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CreateCharacterRequest"
          responses:
            "201":
              description: Character created
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Character"
      /characters/{id}:
        get:
          summary: Get a character by ID
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            "200":
              description: A single character
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Character"
        put:
          summary: Update a character
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CreateCharacterRequest"
          responses:
            "200":
              description: Character updated
        delete:
          summary: Delete a character
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            "204":
              description: Character deleted
    components:
      schemas:
        Character:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            isEarthling:
              type: boolean
            introductionPhase:
              type: string
            pictureUrl:
              type: string
        CreateCharacterRequest:
          type: object
          properties:
            name:
              type: string
            isEarthling:
              type: boolean
            introductionPhase:
              type: string
            pictureUrl:
              type: string
          required:
            - name
---
