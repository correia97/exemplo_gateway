app:
  # Same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: ${BACKSTAGE_BASE_URL:-http://localhost:7007}

backend:
  baseUrl: ${BACKSTAGE_BASE_URL:-http://localhost:7007}
  listen: ':7007'
  cors:
    origin: ${BACKSTAGE_BASE_URL:-http://localhost:7007}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # Backstage Postgres setup — see https://backstage.io/docs/getting-started/config/database
  # `pluginDivisionMode: schema` puts each plugin in its own schema (catalog, auth, scaffolder, ...)
  # inside the same `opencode` database. portal_user needs CREATE on the DB to provision them
  # (see deploy/db/init.sql).
  database:
    client: pg
    pluginDivisionMode: schema
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}

# Auth — see https://backstage.io/docs/getting-started/config/authentication
# Keycloak via generic OIDC provider. metadataUrl uses the in-network keycloak hostname;
# Keycloak's frontchannel URLs (auth endpoint) point at localhost:8080 (browser-reachable)
# while backchannel URLs (token/jwks) match the request host so devportal can reach them
# (KC_HOSTNAME_STRICT_BACKCHANNEL=false on the keycloak service).
auth:
  # Explicit environment so the frontend and backend agree on which provider
  # block to use (frontend's OAuth2 defaults to 'development' otherwise).
  environment: production
  session:
    secret: ${AUTH_SESSION_SECRET}
  providers:
    oidc:
      production:
        metadataUrl: ${AUTH_OIDC_METADATA_URL}
        clientId: ${AUTH_OIDC_CLIENT_ID}
        clientSecret: ${AUTH_OIDC_CLIENT_SECRET}
        prompt: auto
        signIn:
          resolvers:
            - resolver: emailLocalPartMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true
            - resolver: emailMatchingUserEntityProfileEmail
              dangerouslyAllowSignInWithoutUserInCatalog: true

catalog:
  # Locations are resolved relative to the backend process working directory
  # which is /app inside the Docker image.
  locations:
    - type: file
      target: ./examples/entities.yaml

    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

    # OpenCode APIs exposed via Kong gateway
    - type: file
      target: ./examples/kong-apis.yaml
