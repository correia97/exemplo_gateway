@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
      <h3 class="text-lg font-bold text-red-600 mb-2">{{ title }}</h3>
      <p class="text-gray-600 mb-4">{{ message }}</p>
      <div class="bg-gray-50 rounded p-3 mb-4">
        <p><strong>Type:</strong> {{ entityType }}</p>
        <p><strong>Name:</strong> {{ entityName }}</p>
      </div>
      <div class="flex justify-end gap-3">
        <button (click)="cancel.emit()" [disabled]="isLoading"
          class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">
          Cancel
        </button>
        <button (click)="confirm.emit()" [disabled]="isLoading"
          class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 disabled:opacity-50">
          {{ isLoading ? 'Deleting...' : 'Delete' }}
        </button>
      </div>
    </div>
  </div>
}
