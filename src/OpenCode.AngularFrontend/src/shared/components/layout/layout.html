<div class="min-h-screen flex flex-col">
  <!-- Top Bar -->
  <header class="bg-slate-900 text-white h-14 flex items-center px-6 gap-4 shrink-0">
    <button (click)="toggleSidebar()"
      class="text-white p-1 hover:bg-slate-700 rounded cursor-pointer"
      aria-label="Toggle sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a routerLink="/" class="text-white font-bold text-lg hover:text-slate-200">OpenCode</a>
    <div class="ml-auto flex items-center gap-3">
      @if (isAuthenticated$ | async) {
        <span class="text-sm text-slate-300">
          {{ ($any(userData$ | async)?.profile)?.preferred_username }}
        </span>
        <button (click)="logout()"
          class="bg-transparent text-white border border-white/30 px-3 py-1 rounded cursor-pointer text-sm hover:bg-slate-700 transition-colors">
          Logout
        </button>
      } @else {
        <button (click)="login()"
          class="bg-blue-600 text-white border-none px-3 py-1 rounded cursor-pointer text-sm hover:bg-blue-700 transition-colors">
          Login
        </button>
      }
    </div>
  </header>

  <!-- Sidebar + Content -->
  <div class="flex flex-1">
    @if (sidebarOpen) {
      <aside class="w-56 bg-slate-800 text-white p-4 shrink-0 flex flex-col">
        <nav class="flex flex-col gap-1">
          <a routerLink="/" routerLinkActive="bg-slate-700 text-white" class="block px-3 py-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition-colors">
            Dashboard
          </a>
          <a routerLink="/dragonball" routerLinkActive="bg-slate-700 text-white" class="block px-3 py-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition-colors">
            Dragon Ball
          </a>
          <a routerLink="/music" routerLinkActive="bg-slate-700 text-white" class="block px-3 py-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition-colors">
            Music
          </a>
        </nav>
        @if ((isAuthenticated$ | async)) {
          <div class="mt-auto pt-4 border-t border-slate-700">
            <p class="text-xs text-slate-400 px-3">
              Roles: {{ displayRoles$ | async }}
            </p>
          </div>
        }
      </aside>
    }
    <main class="flex-1 p-6 max-w-6xl w-full mx-auto">
      <router-outlet />
    </main>
  </div>
</div>
