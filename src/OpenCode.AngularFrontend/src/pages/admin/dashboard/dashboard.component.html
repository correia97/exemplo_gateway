<h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1>
@if (stats$ | async; as stats) {
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
    @for (card of cards; track card.key) {
      <a [routerLink]="card.path"
        class="{{ card.color }} rounded-lg p-4 text-white hover:opacity-90 transition-opacity block">
        <div class="text-3xl font-bold">{{ $any(stats)[card.key] }}</div>
        <div class="text-sm opacity-90 mt-1">{{ card.label }}</div>
      </a>
    }
  </div>
}
