<form (ngSubmit)="onSubmit()" class="max-w-[500px]">
  <h2 class="text-xl font-bold mb-4">{{ isCreate ? 'New ' + titleText : 'Edit ' + titleText }}</h2>

  @if (isArtistForm) {
    <label class="block font-semibold mt-3 mb-1 text-sm">Name *</label>
    <input [(ngModel)]="name" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Genre</label>
    <input [(ngModel)]="genre" name="genre" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Biography</label>
    <textarea [(ngModel)]="biography" name="biography" class="w-full px-3 py-2 border border-gray-300 rounded text-sm min-h-[80px]"></textarea>
  }

  @if (isAlbumForm) {
    <label class="block font-semibold mt-3 mb-1 text-sm">Title *</label>
    <input [(ngModel)]="title" name="title" required class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Genre</label>
    <input [(ngModel)]="genre" name="genre" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Release Year</label>
    <input type="number" [(ngModel)]="releaseYear" name="releaseYear" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
  }

  @if (isTrackForm) {
    <label class="block font-semibold mt-3 mb-1 text-sm">Title *</label>
    <input [(ngModel)]="title" name="title" required class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Duration (seconds)</label>
    <input type="number" [(ngModel)]="duration" name="duration" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Track Number</label>
    <input type="number" [(ngModel)]="trackNumber" name="trackNumber" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" />
    <label class="block font-semibold mt-3 mb-1 text-sm">Lyrics</label>
    <textarea [(ngModel)]="lyrics" name="lyrics" class="w-full px-3 py-2 border border-gray-300 rounded text-sm min-h-[100px]"></textarea>
  }

  <div class="flex gap-2 mt-6">
    <button type="submit" [disabled]="submitting"
      class="px-6 py-2 rounded text-white border-none cursor-pointer" [class.bg-indigo-600]="!submitting" [class.bg-indigo-400]="submitting">
      {{ submitting ? 'Saving...' : (isCreate ? 'Create' : 'Save Changes') }}
    </button>
    <button type="button" (click)="cancel.emit()"
      class="px-6 py-2 border border-gray-300 rounded cursor-pointer bg-white text-sm">Cancel</button>
  </div>
</form>
