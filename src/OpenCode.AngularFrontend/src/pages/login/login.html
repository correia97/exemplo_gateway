@if (isAuthenticated$ | async) {
  <p class="p-4">You are already logged in. <a routerLink="/" class="text-blue-600">Go to Dashboard</a></p>
} @else {
  <div class="text-center p-16">
    <h1 class="text-3xl font-bold">OpenCode</h1>
    <p class="my-4 text-gray-500">Dragon Ball & Music APIs Explorer</p>
    <button (click)="login()"
      class="px-8 py-3 text-lg cursor-pointer bg-blue-600 text-white rounded-lg border-none hover:bg-blue-700 transition-colors">
      Login with Keycloak
    </button>
  </div>
}
