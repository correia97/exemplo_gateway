apisix:
  node_listen: 9080
  enable_admin: true
  enable_dev_mode: false
  proxy_cache: false
  plugins:
    - openid-connect
    - cors
    - request-id

nginx_config:
  error_log_level: warn

deployment:
  admin:
    admin_key:
      - name: admin
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
    allow_admin:
      - 0.0.0.0/0
    admin_listen:
      ip: 0.0.0.0
      port: 9180
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30
