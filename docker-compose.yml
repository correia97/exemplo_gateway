services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: opencode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/OpenCode.Domain/Data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opencode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/opencode
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost   
      TZ: America/Sao_Paulo
    command:
      - "start-dev"
      - "--import-realm"
    volumes:
      - ./deploy/keycloak/OpenCode-realm.json:/opt/keycloak/data/import/OpenCode-realm.json:ro
    ports:
      - "8080:8080"
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET / HTTP/1.1\r\nhost: localhost\r\n\r\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kong-init-routes:
    image: kong/kong:3.9.1-ubuntu
    container_name: kong-init
    entrypoint: 
      - kong  
    command: 
      - migrations 
      - bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: opencode
      KONG_PG_USER: kong_user
      KONG_PG_PASSWORD: kong_pass
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opencode-net
    # restart: "no"

  gateway:
    image: kong/kong:3.9.1-ubuntu
    container_name: kong
    depends_on:
      kong-init-routes:
        condition: service_started
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: opencode
      KONG_PG_USER: kong_user
      KONG_PG_PASSWORD: kong_pass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      TZ: America/Sao_Paulo
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
 
  busybox:
    image: rootpublic/curl:bookworm-slim_rootio
    container_name: busybox
    entrypoint: ["/bin/sh"]
    command: ["/init-routes.sh"]
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./deploy/kong/init-routes.sh:/init-routes.sh:ro
    networks:
      - opencode-net    

  dragonball-api:
    build:
      context: .
      dockerfile: src/OpenCode.DragonBall.Api/Dockerfile
    container_name: dragonball-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__dragonball: Host=postgres;Port=5432;Database=opencode;Username=dragonball_user;Password=dragonball_pass;SearchPath=dragonball;
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: dragonball-api
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  music-api:
    build:
      context: .
      dockerfile: src/OpenCode.Music.Api/Dockerfile
    container_name: music-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__music: Host=postgres;Port=5432;Database=opencode;Username=music_user;Password=music_pass;SearchPath=music;
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: music-api
      TZ: America/Sao_Paulo
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      TZ: America/Sao_Paulo
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
    networks:
      - opencode-net
    # restart: unless-stopped

  frontend:
    build:
      context: src/OpenCode.Frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - gateway
    ports:
      - "3000:80"
    environment:
      DRAGONBALL_API_URL: http://localhost:5000
      MUSIC_API_URL: http://localhost:5002
      KEYCLOAK_URL: http://localhost:8080
      TZ: America/Sao_Paulo
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  angular-frontend:
    build:
      context: src/OpenCode.AngularFrontend
      dockerfile: Dockerfile
    container_name: angular-frontend
    depends_on:
      - gateway
    ports:
      - "4200:80"
    environment:
      DRAGONBALL_API_URL: http://localhost:5000
      MUSIC_API_URL: http://localhost:5002
      KEYCLOAK_URL: http://localhost:8080
      TZ: America/Sao_Paulo
    networks:
      - opencode-net
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  opencode-net:
    driver: bridge

volumes:
  postgres-data:
